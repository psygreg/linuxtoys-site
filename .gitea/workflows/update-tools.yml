name: Update Tools Categories

on:
  # Trigger on manual dispatch
  workflow_dispatch:

  # Trigger on releases from LinuxToys repository
  repository_dispatch:
    types: [update-tools]

  # Schedule to run weekly
  schedule:
    - cron: "0 0 * * 0" # Run weekly at 00:00 on Sunday

jobs:
  update-tools:
    runs-on: docker
    permissions:
      contents: write
      actions: read

    steps:
      - name: Checkout master branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Clone LinuxToys repository from Gitea
        run: |
          git clone --depth=1 https://git.linux.toys/psygreg/linuxtoys /tmp/linuxtoys

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"

      - name: Install dependencies
        run: |
          npm install axios

      - name: Fetch and process LinuxToys data
        run: |
          node .gitea/scripts/update-tools.js ./cache /tmp/linuxtoys
        env:
          GITHUB_TOKEN: ${{ secrets.GHTOKEN }}

      - name: Clean up LinuxToys clone
        if: always()
        run: |
          rm -rf /tmp/linuxtoys

      - name: Push changes to GitHub Pages repository
        run: |
          git config --local user.email "psygreg@pm.me"
          git config --local user.name "psygreg"

          if [ -n "$(git status --porcelain)" ]; then
            git add cache/
            git commit -m "Update tools categories from Gitea repository"
            git push https://x-access-token:${{ secrets.GHTOKEN }}@github.com/psygreg/linuxtoys-site.git main
          else
            echo "No changes to commit"
          fi
